name: Backend Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build -x test

  test:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: openchs_test
          POSTGRES_USER: openchs
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup PostgreSQL extensions
        run: |
          PGPASSWORD=password psql -h localhost -U openchs -d openchs_test -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
          PGPASSWORD=password psql -h localhost -U openchs -d openchs_test -c "CREATE EXTENSION IF NOT EXISTS ltree;"
          PGPASSWORD=password psql -h localhost -U openchs -d openchs_test -c "CREATE EXTENSION IF NOT EXISTS hstore;"

      - name: Run unit tests
        run: ./gradlew test
        env:
          OPENCHS_DATABASE_HOST: localhost
          OPENCHS_DATABASE_PORT: 5432
          OPENCHS_DATABASE_USER: openchs
          OPENCHS_DATABASE_PASSWORD: password

      - name: Run integration tests and generate coverage
        if: always()
        run: ./gradlew integrationTest jacocoTestReport --info 2>&1 | grep -A 5 "Caused by\|Exception\|Error creating bean\|Failed to load\|Connection refused\|Cannot load" | head -80 || true
        env:
          OPENCHS_DATABASE_HOST: localhost
          OPENCHS_DATABASE_PORT: 5432
          OPENCHS_DATABASE_USER: openchs
          OPENCHS_DATABASE_PASSWORD: password

      - name: Dump integration test failures
        if: always()
        run: |
          echo "=== First test failure (root cause) ==="
          for f in avni-server-api/build/test-results/integrationTest/TEST-*.xml; do
            if grep -q 'Failed to load ApplicationContext\|BeanCreationException\|Cannot load driver\|Connection refused\|datasource' "$f"; then
              echo "--- $f ---"
              cat "$f"
              break
            fi
          done
          echo "=== All failure messages ==="
          grep -h 'message=' avni-server-api/build/test-results/integrationTest/TEST-*.xml 2>/dev/null | head -5
          echo "=== Spring boot test output ==="
          find avni-server-api/build -name "*.output" -exec cat {} \; 2>/dev/null | tail -80
          echo "=== Surefire output ==="
          cat avni-server-api/build/reports/tests/integrationTest/index.html 2>/dev/null | grep -oP '<pre>.*?</pre>' | head -5 || true

      - name: Debug coverage files
        if: always()
        run: |
          echo "=== Exec files ==="
          find . -name "*.exec" -ls

      - name: Check coverage threshold
        if: always()
        run: |
          REPORT="avni-server-api/build/reports/jacoco/test/html/index.html"
          echo "Using report: $REPORT"
          COVERAGE=$(grep -oP 'Total.*?(\d+)%' "$REPORT" | grep -oP '\d+' | tail -1)
          echo "Code coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 30 ]; then
            echo "Coverage ${COVERAGE}% is below 30% threshold"
            exit 1
          fi

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: '**/build/test-results/test/TEST-*.xml'
          reporter: java-junit

      - name: Generate integration test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Test Results
          path: '**/build/test-results/integrationTest/TEST-*.xml'
          reporter: java-junit
          fail-on-empty: 'false'

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase repository name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}/avni-backend:latest
