name: Backend Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build -x test

  test:
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: openchs_test
          POSTGRES_USER: openchs
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Run integration tests
        continue-on-error: true
        run: ./gradlew integrationTest
        env:
          OPENCHS_DATABASE_HOST: localhost
          OPENCHS_DATABASE_PORT: 5432
          OPENCHS_DATABASE_USER: openchs
          OPENCHS_DATABASE_PASSWORD: password
          SPRING_FLYWAY_BASELINE_ON_MIGRATE: true
          SPRING_FLYWAY_CLEAN_DISABLED: false
          SPRING_JPA_PROPERTIES_HIBERNATE_HBM2DDL_AUTO: none

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: '**/build/test-results/test/TEST-*.xml'
          reporter: java-junit

      - name: Generate integration test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Test Results
          path: '**/build/test-results/integrationTest/TEST-*.xml'
          reporter: java-junit
